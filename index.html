<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product Search Tool</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --card:#ffffff;
  --inner:#f4f8f8;
  --text:#111827;
  --sub:#6b7280;
  --line:#d6e8e8;
  --accent:#38a3a5;
  --accent-mid:#2d8a8c;
  --accent-light:#bfd6d5;
  --amber:#f9c97e;
  --amber-light:#ffe8e0;
  --orange:#e16b8c;
  --orange-light:#f8c3cd;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 8px 24px rgba(56,163,165,.10);
  --shadow-sm:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(56,163,165,.08);
  --radius:16px;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
}

.top-bar{
  height:3px;
  background:linear-gradient(90deg,#ec4f7d,#c38ec7,#6d9eeb,#38a3a5,#a1b860);
}

.page-wrap{
  max-width:1100px;
  margin:auto;
  padding:36px 24px 56px;
}

/* ── Header ── */
.header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:20px;
  margin-bottom:28px;
  flex-wrap:wrap;
}

.eyebrow{
  font-size:11px;
  font-weight:600;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--accent-mid);
  margin-bottom:8px;
}

.header h1{
  font-size:30px;
  font-weight:700;
  color:var(--text);
  line-height:1.2;
  letter-spacing:-.02em;
}

.header-desc{
  margin-top:6px;
  color:var(--sub);
  font-size:13px;
  line-height:1.7;
}

.header-stats{
  display:flex;
  gap:10px;
  flex-shrink:0;
}

.stat-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px 22px;
  min-width:82px;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}

.stat-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,#38a3a5,#6d9eeb);
}

.stat-num{
  font-size:22px;
  font-weight:700;
  color:var(--accent);
  line-height:1;
}

.stat-label{
  font-size:11px;
  color:var(--sub);
  margin-top:4px;
  font-weight:500;
  letter-spacing:.04em;
}

/* ── Cards ── */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:28px 32px;
  box-shadow:var(--shadow);
}

.card + .card{ margin-top:20px; }

/* ── Card header row ── */
.card-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:22px;
}

.card-header-icon{
  width:32px;
  height:32px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  flex-shrink:0;
}

.card-header-icon--green{ background:var(--accent-light); }
.card-header-icon--orange{ background:var(--orange-light); }

.card-header-title{
  font-size:15px;
  font-weight:700;
  color:var(--text);
}

.card-header-sub{
  font-size:12px;
  color:var(--sub);
  margin-left:auto;
}

/* ── Search box ── */
.search-box{
  display:flex;
  align-items:center;
  background:#fff;
  border:1.5px solid var(--line);
  border-radius:12px;
  padding:0 6px 0 16px;
  gap:10px;
  margin-bottom:22px;
  transition:.2s;
  box-shadow:var(--shadow-sm);
}

.search-box:focus-within{
  border-color:var(--accent-mid);
  box-shadow:0 0 0 3px rgba(56,163,165,.14),var(--shadow-sm);
}

.search-icon{ font-size:15px; flex-shrink:0; color:var(--sub); }

.search-input{
  flex:1;
  height:44px;
  border:none;
  background:transparent;
  font-family:'Noto Sans TC',sans-serif;
  font-size:14px;
  outline:none;
  color:var(--text);
  min-width:0;
}

.search-input::placeholder{ color:#c0c8c0; }

.search-btn{
  border:none;
  color:#fff;
  font-family:'Noto Sans TC',sans-serif;
  font-weight:600;
  font-size:13px;
  height:34px;
  padding:0 22px;
  border-radius:8px;
  cursor:pointer;
  transition:.2s;
  letter-spacing:.04em;
  white-space:nowrap;
  flex-shrink:0;
}

.search-btn--green{ background:var(--accent); }
.search-btn--green:hover{ background:var(--accent-mid); box-shadow:0 4px 14px rgba(56,163,165,.30); transform:translateY(-1px); }
.search-btn--orange{ background:var(--orange); }
.search-btn--orange:hover{ background:#c8567a; box-shadow:0 4px 14px rgba(225,107,140,.30); transform:translateY(-1px); }

/* [互動優化] 查詢中鎖住按鈕時的樣式 */
.search-btn:disabled{ opacity:.6; cursor:not-allowed; transform:none !important; box-shadow:none !important; }

/* ── Grid 2 col ── */
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:16px;
}

/* ── Section block ── */
.section-block{
  background:var(--inner);
  border:1px solid var(--line);
  border-radius:12px;
  padding:18px 20px;
  min-width:0;
}

.section-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

.section-title{
  font-size:13px;
  font-weight:600;
  color:var(--text);
  display:flex;
  align-items:center;
  gap:7px;
}

.section-title-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--amber);
  flex-shrink:0;
}

.section-hint{
  font-size:11px;
  color:var(--sub);
  margin-top:3px;
  padding-left:13px;
}

.clear-btn{
  border:1px solid var(--line);
  background:#fff;
  color:var(--sub);
  padding:4px 12px;
  border-radius:8px;
  cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  font-size:11.5px;
  font-weight:500;
  transition:.15s;
  white-space:nowrap;
  flex-shrink:0;
}

.clear-btn:hover{ background:var(--accent-light); color:var(--accent); border-color:var(--accent-mid); }

/* ── Chips ── */
.chips{ display:flex; flex-wrap:wrap; gap:6px; }

/*
 * [#11 優化] chip 顏色改用 CSS 自訂變數統一管理。
 * 每個 chip 透過 JS 注入 --chip-clr（品牌色），
 * inactive 狀態用低透明度，active 狀態直接填滿品牌色。
 * 新增品牌只需在 JS 的 brands 陣列加 color 欄位即可。
 */
.chip{
  --chip-clr: 74,106,74; /* 預設綠色 (R,G,B) */
  border:1px solid rgba(var(--chip-clr),.28);
  background:rgba(var(--chip-clr),.07);
  padding:5px 13px;
  border-radius:8px;
  cursor:pointer;
  /* [互動優化] 點擊時的彈跳感：按下用 transform .1s 機速縮小，
     放開時用 1.18 結尾再彈一下，是回彈手感不會死板。 */
  transition:background-color .15s, border-color .15s, color .15s,
             transform .22s cubic-bezier(.34,1.56,.64,1);
  color:rgb(var(--chip-clr));
  font-family:'Noto Sans TC',sans-serif;
  font-size:12.5px;
  font-weight:500;
  letter-spacing:.01em;
  line-height:1.4;
  box-shadow:none !important;
  user-select:none;
  position:relative;
}

.chip:active{
  transform:scale(.88);
  transition:transform .08s ease;
}

.chip:hover{
  background:rgba(var(--chip-clr),.16);
  border-color:rgba(var(--chip-clr),.5);
}

/* active 狀態：填滿品牌色，白字（tryme 例外由 JS 額外處理） */
.chip.active{
  background:rgb(var(--chip-clr));
  border-color:rgb(var(--chip-clr));
  color:#fff;
}

/* tryme 品牌色淺，active 維持淺色底深字 */
.chip.active[data-id="tryme"]{
  background:#ffcfc9;
  border-color:#f8a79e;
  color:#7a3a35;
}

/* ── Select-all / clear toggle [#2] ── */
.select-all-btn{
  border:1px solid var(--line);
  background:#fff;
  color:var(--accent);
  font-family:'Noto Sans TC',sans-serif;
  padding:4px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:11.5px;
  font-weight:600;
  transition:.15s;
  white-space:nowrap;
  flex-shrink:0;
  border-color:rgba(var(--chip-clr,46,125,50),.35);
}
.select-all-btn:hover{ background:var(--accent-light); border-color:var(--accent-mid); }

/* ── Copy link button [#3] ── */
.copy-btn{
  width:28px; height:28px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; flex-shrink:0; color:var(--sub);
  cursor:pointer;
  transition:.15s;
  margin-left:4px;
}
.copy-btn:hover{ background:var(--accent-light); border-color:var(--accent-mid); color:var(--accent); }
.copy-btn.copied{ background:var(--accent-light); border-color:var(--accent); color:var(--accent); }

/* ── Confirm modal [#4] ── */
.modal-overlay{
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,.35);
  z-index:999;
  align-items:center; justify-content:center;
}
.modal-overlay.show{ display:flex; }
.modal-box{
  background:#fff;
  border-radius:18px;
  padding:32px 28px 24px;
  max-width:340px; width:90%;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
  text-align:center;
}
.modal-icon{ font-size:32px; margin-bottom:12px; }
.modal-title{ font-size:16px; font-weight:700; color:var(--text); margin-bottom:8px; }
.modal-body{ font-size:13px; color:var(--sub); line-height:1.7; margin-bottom:24px; }
.modal-body strong{ color:var(--text); }
.modal-btns{ display:flex; gap:10px; justify-content:center; }
.modal-btn{
  border:none; font-family:'Noto Sans TC',sans-serif; font-weight:600;
  font-size:13px; padding:10px 24px; border-radius:8px; cursor:pointer; transition:.15s;
}
.modal-btn--cancel{ background:var(--inner); color:var(--sub); border:1px solid var(--line); }
.modal-btn--cancel:hover{ background:#e8e8e8; }
.modal-btn--ok{ background:var(--accent); color:#fff; }
.modal-btn--ok:hover{ background:var(--accent-mid); }

/* ── Collapse results [#7] ── */
.results-toggle-btn{
  border:none; background:transparent; cursor:pointer;
  font-size:12px; color:var(--sub); font-family:'Noto Sans TC',sans-serif;
  font-weight:500; display:flex; align-items:center; gap:4px;
  padding:2px 6px; border-radius:8px; transition:.15s;
  flex-shrink:0;
}
.results-toggle-btn:hover{ background:var(--inner); color:var(--text); }
.results-grid.collapsed .result-link:nth-child(n+6){ display:none; }



/* ── Long-press tooltip [#12] ── */
.chip-tooltip{
  position:fixed;
  background:#1a1a1a;
  color:#fff;
  font-size:11.5px;
  font-family:'Noto Sans TC',sans-serif;
  padding:6px 12px;
  border-radius:8px;
  pointer-events:none;
  z-index:9999;
  white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  opacity:0;
  transition:opacity .15s;
}
.chip-tooltip.show{ opacity:1; }
.chip-tooltip::after{
  content:'';
  position:absolute;
  top:100%; left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:#1a1a1a;
}

/* ── Summary ── */
.summary{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--amber-light);
  border:1px solid rgba(245,158,11,.22);
  border-radius:12px;
  padding:10px 16px;
}

.summary-dot{ width:7px; height:7px; border-radius:50%; background:var(--amber); flex-shrink:0; }
.summary-text{ color:#b05a6e; font-size:12.5px; font-weight:500; }
.summary-text strong{ color:#8c3a50; font-weight:700; }

/* ── Mode toggle (關鍵字 / 品牌) ── */
.mode-toggle{
  display:inline-flex;
  background:var(--inner);
  border:1px solid var(--line);
  border-radius:8px;
  padding:3px;
  gap:2px;
  margin-bottom:16px;
}

.mode-btn{
  border:none;
  background:transparent;
  color:var(--sub);
  font-family:'Noto Sans TC',sans-serif;
  font-size:12.5px;
  font-weight:600;
  padding:6px 18px;
  border-radius:8px;
  cursor:pointer;
  transition:.15s;
  letter-spacing:.02em;
}

.mode-btn.active{
  background:#fff;
  color:var(--orange);
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

/* ── Special platform chips ── */
.sp-chips{
  display:flex;
  gap:8px;
  margin-bottom:18px;
  flex-wrap:wrap;
}

/* ── Results ── */
.results{ display:none; }
.divider{ height:1px; background:var(--line); margin:22px 0; }

.results-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.results-title{
  font-size:13px;
  font-weight:600;
  color:var(--text);
  display:flex;
  align-items:center;
  gap:7px;
}

.results-hint{ font-size:11px; color:var(--sub); }
.results-grid{ display:grid; gap:7px; }

.result-link{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:12px 16px;
  border-radius:12px;
  background:var(--inner);
  text-decoration:none;
  color:var(--text);
  transition:.18s;
  border:1px solid transparent;
}

.result-link:hover{
  background:#fff;
  border-color:var(--line);
  transform:translateY(-1px);
  box-shadow:var(--shadow-sm);
}

.result-left{ display:flex; flex-direction:column; gap:2px; }
.result-platform{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; }
.result-platform--green{ color:#38a3a5; }
.result-platform--orange{ color:#e16b8c; }
.result-keyword{ font-size:13px; color:var(--text); }

.result-arrow{
  width:28px; height:28px;
  border-radius:8px;
  border:1px solid var(--line);
  background:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; flex-shrink:0; color:var(--sub);
  transition:.15s;
}
.result-link:hover .result-arrow{ background:#38a3a5; border-color:#38a3a5; color:#fff; }

/* ── Message ── */
.msg{
  margin-top:14px;
  padding:11px 16px;
  border-radius:12px;
  font-size:12.5px;
  font-weight:500;
  display:none;
}

.msg.ok{ background:#e6f4f4; color:#1e6e70; border:1px solid #b0d8d8; }
.msg.err{ background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }

/* ── Mobile ── */
@media(max-width:640px){
  .page-wrap{ padding:20px 14px 40px; }
  .header{ margin-bottom:20px; align-items:flex-start; gap:14px; }
  .header h1{ font-size:22px; }
  .eyebrow{ font-size:10px; }
  .header-desc{ font-size:12px; }
  .header-stats{ gap:8px; }
  .stat-card{ padding:10px 14px; min-width:68px; border-radius:12px; }
  .stat-num{ font-size:18px; }
  .stat-label{ font-size:10px; }
  .card{ padding:16px 14px; border-radius:16px; }
  .card + .card{ margin-top:14px; }
  .search-box{ padding:0 5px 0 12px; margin-bottom:16px; }
  .search-input{ height:40px; font-size:13px; }
  .search-btn{ height:30px; font-size:12px; padding:0 14px; border-radius:7px; }
  .grid-2{ gap:8px; margin-bottom:12px; }
  .section-block{ padding:12px 10px; border-radius:12px; }
  .section-title{ font-size:12px; }
  .section-hint{ font-size:10px; }
  .clear-btn{ font-size:10px; padding:3px 8px; }
  .chips{ gap:5px; }
  .chip{ font-size:11px; padding:4px 8px; border-radius:8px; }
  .summary{ padding:9px 12px; }
  .summary-text{ font-size:11px; }
  .result-link{ padding:10px 12px; }
  .result-platform{ font-size:9px; }
  .result-keyword{ font-size:12px; }
  .result-arrow{ width:24px; height:24px; font-size:11px; }
  .msg{ font-size:12px; }
  .mode-btn{ font-size:12px; padding:5px 14px; }
}

@media(max-width:390px){
  .page-wrap{ padding:14px 10px 32px; }
  .header h1{ font-size:19px; }
  .card{ padding:12px 10px; }
  .chip{ font-size:10.5px; padding:3px 7px; }
  .stat-card{ padding:8px 10px; min-width:60px; }
  .stat-num{ font-size:16px; }
}
</style>
</head>

<body>

<div class="top-bar"></div>

<div class="page-wrap">

  <!-- ── Header ── -->
  <div class="header">
    <div>
      <h1>Product Search Tool</h1>
      <div class="header-desc">快速查詢各大電商平台的商品販售情況，掌握上架狀況與價格資訊。</div>
    </div>
    <div class="header-stats">
      <div class="stat-card">
        <div class="stat-num" id="statPlatform">—</div>
        <div class="stat-label">已選平台</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statBrand">—</div>
        <div class="stat-label">已選品牌</div>
      </div>
    </div>
  </div>

  <!-- ══ Card 1：一般平台搜尋 ══ -->
  <div class="card">

    <div class="card-header">
      <div class="card-header-icon card-header-icon--green">🔎</div>
      <div class="card-header-title">電商平台</div>
    </div>

    <div class="search-box">
      <span class="search-icon">🔎</span>
      <input type="text" id="searchInput" class="search-input" placeholder="輸入關鍵字，例如：魚油、益生菌">
      <button class="search-btn search-btn--green" id="doSearchBtn">查詢商品</button>
    </div>

    <div class="grid-2">

      <div class="section-block" id="platformBlock">
        <div class="section-head">
          <div>
            <div class="section-title"><span class="section-title-dot"></span>平台</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <button class="select-all-btn" id="platformAllBtn">全選</button>
            <button class="clear-btn" id="platformClearBtn">清除</button>
          </div>
        </div>
        <div class="chips" id="platformGrid"></div>
      </div>

      <div class="section-block" id="brandBlock">
        <div class="section-head">
          <div>
            <div class="section-title"><span class="section-title-dot"></span>品牌</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <button class="select-all-btn" id="brandAllBtn">全選</button>
            <button class="clear-btn" id="brandClearBtn">清除</button>
          </div>
        </div>
        <div class="chips" id="brandGrid"></div>
      </div>

    </div>

    <div class="msg err" id="platformWarn" style="display:none;margin-bottom:12px;">請至少選擇一個平台</div>

    <div class="summary">
      <div class="summary-dot"></div>
      <div class="summary-text" id="selectedCount"></div>
    </div>

    <div class="results" id="results">
      <div class="divider"></div>
      <div class="results-head">
        <div class="results-title"><span class="section-title-dot"></span>查詢結果</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div class="results-hint">已自動於背景分頁開啟，請至瀏覽器分頁列表查看</div>
          <!-- [#7] 收合按鈕 -->
          <button class="results-toggle-btn" id="resultsToggleBtn">▲ 收合</button>
        </div>
      </div>
      <div class="results-grid" id="linkItems"></div>
    </div>

    <div class="msg" id="resultMsg"></div>

  </div>

  <!-- ══ Card 2：短蝦 / 蝦皮超市 ══ -->
  <div class="card">

    <div class="card-header">
      <div class="card-header-icon card-header-icon--orange">🦐</div>
      <div class="card-header-title">短蝦 / 蝦皮超市</div>
      <div class="card-header-sub">關鍵字 或 品牌，擇一搜尋</div>
    </div>

    <!-- 平台選擇 -->
    <div class="sp-chips">
      <div class="chips" id="spPlatformGrid"></div>
    </div>

    <!-- 模式切換 -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeKw">關鍵字搜尋</button>
      <button class="mode-btn" id="modeBrand">品牌篩選</button>
    </div>

    <!-- 關鍵字輸入 -->
    <div id="spKwArea">
      <div class="search-box">
        <span class="search-icon">🔎</span>
        <input type="text" id="spKwInput" class="search-input" placeholder="輸入關鍵字，例如：魚油">
        <button class="search-btn search-btn--orange" id="spSearchBtnKw">查詢</button>
      </div>
    </div>

    <div id="spBrandArea" style="display:none;">
      <div class="search-box" style="margin-bottom:16px;">
        <span class="search-icon">🔎</span>
        <input type="text" id="spBrandKwInput" class="search-input" placeholder="輸入關鍵字（選填），例如：魚油">
      </div>
      <div class="section-block" style="margin-bottom:16px;">
        <div class="section-head">
          <div>
            <div class="section-title"><span class="section-title-dot"></span>選擇品牌</div>
            <div class="section-hint">可多選，每個品牌獨立開啟</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="select-all-btn" id="spBrandAllBtn">全選</button>
            <button class="clear-btn" id="spBrandClearBtn">清除</button>
          </div>
        </div>
        <div class="chips" id="spBrandGrid"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;">
        <button class="search-btn search-btn--orange" id="spSearchBtnBrand">查詢</button>
      </div>
    </div>

    <div class="results" id="spResults">
      <div class="divider"></div>
      <div class="results-head">
        <div class="results-title"><span class="section-title-dot"></span>查詢結果</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div class="results-hint">已自動於背景分頁開啟，請至瀏覽器分頁列表查看</div>
          <!-- [#7] 收合按鈕 -->
          <button class="results-toggle-btn" id="spResultsToggleBtn">▲ 收合</button>
        </div>
      </div>
      <div class="results-grid" id="spLinkItems"></div>
    </div>

    <div class="msg" id="spResultMsg"></div>

  </div>

</div>

<!-- [#4] 確認 modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <div class="modal-icon">🔗</div>
    <div class="modal-title">即將開啟多個頁面</div>
    <div class="modal-body" id="confirmModalBody"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn--cancel" id="modalCancelBtn">取消</button>
      <button class="modal-btn modal-btn--ok" id="confirmModalOkBtn">確定開啟</button>
    </div>
  </div>
</div>

<!-- [#12] 長按 tooltip -->
<div class="chip-tooltip" id="chipTooltip"></div>

<script src="app.js"></script>
</body>
</html>
