<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>商品查詢小幫手</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --card:#ffffff;
  --inner:#f7f9f7;
  --text:#111827;
  --sub:#6b7280;
  --line:#e2ece2;
  --accent:#2e7d32;
  --accent-mid:#388e3c;
  --accent-light:#edf7ed;
  --amber:#f59e0b;
  --amber-light:#fffbeb;
  --orange:#ea6c00;
  --orange-light:#fff4ec;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 8px 24px rgba(46,125,50,.07);
  --shadow-sm:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(46,125,50,.06);
  --radius:18px;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
}

.top-bar{
  height:3px;
  background:linear-gradient(90deg,var(--accent),#66bb6a,var(--amber));
}

.page-wrap{
  max-width:1100px;
  margin:auto;
  padding:36px 24px 56px;
}

/* ── Header ── */
.header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:20px;
  margin-bottom:28px;
  flex-wrap:wrap;
}

.eyebrow{
  font-size:11px;
  font-weight:600;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--accent-mid);
  margin-bottom:8px;
}

.header h1{
  font-size:30px;
  font-weight:700;
  color:var(--text);
  line-height:1.2;
  letter-spacing:-.02em;
}

.header-desc{
  margin-top:6px;
  color:var(--sub);
  font-size:13px;
  line-height:1.7;
}

.header-stats{
  display:flex;
  gap:10px;
  flex-shrink:0;
}

.stat-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 22px;
  min-width:82px;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}

.stat-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,var(--accent),#66bb6a);
}

.stat-num{
  font-size:22px;
  font-weight:700;
  color:var(--accent);
  line-height:1;
}

.stat-label{
  font-size:11px;
  color:var(--sub);
  margin-top:4px;
  font-weight:500;
  letter-spacing:.04em;
}

/* ── Cards ── */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:28px 32px;
  box-shadow:var(--shadow);
}

.card + .card{ margin-top:20px; }

/* ── Card header row ── */
.card-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:22px;
}

.card-header-icon{
  width:32px;
  height:32px;
  border-radius:9px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:15px;
  flex-shrink:0;
}

.card-header-icon--green{ background:var(--accent-light); }
.card-header-icon--orange{ background:var(--orange-light); }

.card-header-title{
  font-size:15px;
  font-weight:700;
  color:var(--text);
}

.card-header-sub{
  font-size:12px;
  color:var(--sub);
  margin-left:auto;
}

/* ── Search box ── */
.search-box{
  display:flex;
  align-items:center;
  background:#fff;
  border:1.5px solid var(--line);
  border-radius:12px;
  padding:0 6px 0 16px;
  gap:10px;
  margin-bottom:22px;
  transition:.2s;
  box-shadow:var(--shadow-sm);
}

.search-box:focus-within{
  border-color:var(--accent-mid);
  box-shadow:0 0 0 3px rgba(56,142,60,.12),var(--shadow-sm);
}

.search-icon{ font-size:15px; flex-shrink:0; color:var(--sub); }

.search-input{
  flex:1;
  height:44px;
  border:none;
  background:transparent;
  font-family:'Noto Sans TC',sans-serif;
  font-size:14px;
  outline:none;
  color:var(--text);
  min-width:0;
}

.search-input::placeholder{ color:#c0c8c0; }

.search-btn{
  border:none;
  color:#fff;
  font-family:'Noto Sans TC',sans-serif;
  font-weight:600;
  font-size:13px;
  height:34px;
  padding:0 22px;
  border-radius:8px;
  cursor:pointer;
  transition:.2s;
  letter-spacing:.04em;
  white-space:nowrap;
  flex-shrink:0;
}

.search-btn--green{ background:var(--accent); }
.search-btn--green:hover{ background:var(--accent-mid); box-shadow:0 4px 14px rgba(46,125,50,.28); transform:translateY(-1px); }
.search-btn--orange{ background:var(--orange); }
.search-btn--orange:hover{ background:#c85a00; box-shadow:0 4px 14px rgba(234,108,0,.28); transform:translateY(-1px); }

/* ── Grid 2 col ── */
.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:16px;
}

/* ── Section block ── */
.section-block{
  background:var(--inner);
  border:1px solid var(--line);
  border-radius:12px;
  padding:18px 20px;
  min-width:0;
}

.section-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

.section-title{
  font-size:13px;
  font-weight:600;
  color:var(--text);
  display:flex;
  align-items:center;
  gap:7px;
}

.section-title-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--amber);
  flex-shrink:0;
}

.section-hint{
  font-size:11px;
  color:var(--sub);
  margin-top:3px;
  padding-left:13px;
}

.clear-btn{
  border:1px solid var(--line);
  background:#fff;
  color:var(--sub);
  padding:4px 12px;
  border-radius:6px;
  cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  font-size:11.5px;
  font-weight:500;
  transition:.15s;
  white-space:nowrap;
  flex-shrink:0;
}

.clear-btn:hover{ background:var(--accent-light); color:var(--accent); border-color:var(--accent-mid); }

/* ── Chips ── */
.chips{ display:flex; flex-wrap:wrap; gap:6px; }

.chip{
  border:1px solid #d8e8d8;
  background:#fff;
  padding:5px 13px;
  border-radius:7px;
  cursor:pointer;
  transition:.15s;
  color:#4a6a4a;
  font-family:'Noto Sans TC',sans-serif;
  font-size:12.5px;
  font-weight:500;
  letter-spacing:.01em;
  line-height:1.4;
  box-shadow:none !important;
  user-select:none;
}

.chip:hover{ background:var(--accent-light); border-color:var(--accent-mid); color:var(--accent); }

/* Platform inactive */
.chip[data-id="momo"]     { background:rgba(242,0,202,.07);  border-color:rgba(242,0,202,.28);  color:#8c0075; }
.chip[data-id="shopee"]   { background:rgba(247,67,46,.07);  border-color:rgba(247,67,46,.28);  color:#b02010; }
.chip[data-id="yahoo"]    { background:rgba(157,97,255,.07); border-color:rgba(157,97,255,.28); color:#5a2fbb; }
.chip[data-id="pchome"]   { background:rgba(234,23,23,.07);  border-color:rgba(234,23,23,.28);  color:#aa0000; }
.chip[data-id="etmall"]   { background:rgba(182,0,5,.07);    border-color:rgba(182,0,5,.28);    color:#880003; }
.chip[data-id="cyberbiz"] { background:rgba(4,50,141,.07);   border-color:rgba(4,50,141,.28);   color:#04328d; }

/* Special platform chips */
.chip[data-id="tsa"]        { background:rgba(247,100,30,.08); border-color:rgba(247,100,30,.32); color:#b84010; }
.chip[data-id="shopeemart"] { background:rgba(234,108,0,.08);  border-color:rgba(234,108,0,.32);  color:#92600a; }

/* Brand inactive */
.chip[data-id="damo"]      { background:rgba(9,60,113,.07);    border-color:rgba(9,60,113,.28);    color:#093c71; }
.chip[data-id="petage"]    { background:rgba(111,195,179,.14); border-color:rgba(111,195,179,.42); color:#2e7d70; }
.chip[data-id="yuxi"]      { background:rgba(183,28,34,.07);   border-color:rgba(183,28,34,.28);   color:#b71c22; }
.chip[data-id="powerhero"] { background:rgba(0,0,0,.04);       border-color:rgba(0,0,0,.18);       color:#333; }
.chip[data-id="ourpet"]    { background:rgba(41,171,226,.07);  border-color:rgba(41,171,226,.28);  color:#0d6fa0; }
.chip[data-id="fumu"]      { background:rgba(196,113,92,.09);  border-color:rgba(196,113,92,.32);  color:#8a3e2a; }
.chip[data-id="oshima"]    { background:rgba(184,146,90,.09);  border-color:rgba(184,146,90,.32);  color:#7a5520; }
.chip[data-id="xxs"]       { background:rgba(255,75,127,.07);  border-color:rgba(255,75,127,.28);  color:#cc1255; }
.chip[data-id="tryme"]     { background:rgba(255,207,201,.22); border-color:rgba(248,167,158,.42); color:#7a3a35; }
.chip[data-id="yakupet"]   { background:rgba(96,38,158,.07);   border-color:rgba(96,38,158,.28);   color:#60269e; }

/* Active */
.chip.active[data-id="momo"]       { background:#f200ca; border-color:#f200ca; color:#fff; }
.chip.active[data-id="shopee"]     { background:#f7432e; border-color:#f7432e; color:#fff; }
.chip.active[data-id="yahoo"]      { background:#9d61ff; border-color:#9d61ff; color:#fff; }
.chip.active[data-id="pchome"]     { background:#ea1717; border-color:#ea1717; color:#fff; }
.chip.active[data-id="etmall"]     { background:#b60005; border-color:#b60005; color:#fff; }
.chip.active[data-id="cyberbiz"]   { background:#04328d; border-color:#04328d; color:#fff; }
.chip.active[data-id="tsa"]        { background:#f7641e; border-color:#f7641e; color:#fff; }
.chip.active[data-id="shopeemart"] { background:#ea6c00; border-color:#ea6c00; color:#fff; }
.chip.active[data-id="damo"]      { background:#093c71; border-color:#093c71; color:#fff; }
.chip.active[data-id="petage"]    { background:#3d9f93; border-color:#3d9f93; color:#fff; }
.chip.active[data-id="yuxi"]      { background:#b71c22; border-color:#b71c22; color:#fff; }
.chip.active[data-id="powerhero"] { background:#333;    border-color:#333;    color:#fff; }
.chip.active[data-id="ourpet"]    { background:#0d8fd4; border-color:#0d8fd4; color:#fff; }
.chip.active[data-id="fumu"]      { background:#c4715c; border-color:#c4715c; color:#fff; }
.chip.active[data-id="oshima"]    { background:#b8925a; border-color:#b8925a; color:#fff; }
.chip.active[data-id="xxs"]       { background:#ff4b7f; border-color:#ff4b7f; color:#fff; }
.chip.active[data-id="tryme"]     { background:#ffcfc9; border-color:#f8a79e; color:#7a3a35; }
.chip.active[data-id="yakupet"]   { background:#60269e; border-color:#60269e; color:#fff; }

/* ── Summary ── */
.summary{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--amber-light);
  border:1px solid rgba(245,158,11,.22);
  border-radius:10px;
  padding:10px 16px;
}

.summary-dot{ width:7px; height:7px; border-radius:50%; background:var(--amber); flex-shrink:0; }
.summary-text{ color:#92600a; font-size:12.5px; font-weight:500; }
.summary-text strong{ color:#7c4a00; font-weight:700; }

/* ── Mode toggle (關鍵字 / 品牌) ── */
.mode-toggle{
  display:inline-flex;
  background:var(--inner);
  border:1px solid var(--line);
  border-radius:9px;
  padding:3px;
  gap:2px;
  margin-bottom:16px;
}

.mode-btn{
  border:none;
  background:transparent;
  color:var(--sub);
  font-family:'Noto Sans TC',sans-serif;
  font-size:12.5px;
  font-weight:600;
  padding:6px 18px;
  border-radius:7px;
  cursor:pointer;
  transition:.15s;
  letter-spacing:.02em;
}

.mode-btn.active{
  background:#fff;
  color:var(--orange);
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

/* ── Special platform chips ── */
.sp-chips{
  display:flex;
  gap:8px;
  margin-bottom:18px;
  flex-wrap:wrap;
}

/* ── Results ── */
.results{ display:none; }
.divider{ height:1px; background:var(--line); margin:22px 0; }

.results-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.results-title{
  font-size:13px;
  font-weight:600;
  color:var(--text);
  display:flex;
  align-items:center;
  gap:7px;
}

.results-hint{ font-size:11px; color:var(--sub); }
.results-grid{ display:grid; gap:7px; }

.result-link{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:12px 16px;
  border-radius:10px;
  background:var(--inner);
  text-decoration:none;
  color:var(--text);
  transition:.18s;
  border:1px solid transparent;
}

.result-link:hover{
  background:#fff;
  border-color:var(--line);
  transform:translateY(-1px);
  box-shadow:var(--shadow-sm);
}

.result-left{ display:flex; flex-direction:column; gap:2px; }
.result-platform{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; }
.result-platform--green{ color:var(--accent); }
.result-platform--orange{ color:var(--orange); }
.result-keyword{ font-size:13px; color:var(--text); }

.result-arrow{
  width:28px; height:28px;
  border-radius:7px;
  border:1px solid var(--line);
  background:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; flex-shrink:0; color:var(--sub);
  transition:.15s;
}
.result-link:hover .result-arrow{ background:var(--accent); border-color:var(--accent); color:#fff; }

/* ── Message ── */
.msg{
  margin-top:14px;
  padding:11px 16px;
  border-radius:10px;
  font-size:12.5px;
  font-weight:500;
  display:none;
}

.msg.ok{ background:#edf7ed; color:#1b5e20; border:1px solid #c8e6c9; }
.msg.err{ background:#fef2f2; color:#991b1b; border:1px solid #fecaca; }

/* ── Mobile ── */
@media(max-width:640px){
  .page-wrap{ padding:20px 14px 40px; }
  .header{ margin-bottom:20px; align-items:flex-start; gap:14px; }
  .header h1{ font-size:22px; }
  .eyebrow{ font-size:10px; }
  .header-desc{ font-size:12px; }
  .header-stats{ gap:8px; }
  .stat-card{ padding:10px 14px; min-width:68px; border-radius:12px; }
  .stat-num{ font-size:18px; }
  .stat-label{ font-size:10px; }
  .card{ padding:16px 14px; border-radius:14px; }
  .card + .card{ margin-top:14px; }
  .search-box{ padding:0 5px 0 12px; margin-bottom:16px; }
  .search-input{ height:40px; font-size:13px; }
  .search-btn{ height:30px; font-size:12px; padding:0 14px; border-radius:7px; }
  .grid-2{ gap:8px; margin-bottom:12px; }
  .section-block{ padding:12px 10px; border-radius:10px; }
  .section-title{ font-size:12px; }
  .section-hint{ font-size:10px; }
  .clear-btn{ font-size:10px; padding:3px 8px; }
  .chips{ gap:5px; }
  .chip{ font-size:11px; padding:4px 8px; border-radius:6px; }
  .summary{ padding:9px 12px; }
  .summary-text{ font-size:11px; }
  .result-link{ padding:10px 12px; }
  .result-platform{ font-size:9px; }
  .result-keyword{ font-size:12px; }
  .result-arrow{ width:24px; height:24px; font-size:11px; }
  .msg{ font-size:12px; }
  .mode-btn{ font-size:12px; padding:5px 14px; }
}

@media(max-width:390px){
  .page-wrap{ padding:14px 10px 32px; }
  .header h1{ font-size:19px; }
  .card{ padding:12px 10px; }
  .chip{ font-size:10.5px; padding:3px 7px; }
  .stat-card{ padding:8px 10px; min-width:60px; }
  .stat-num{ font-size:16px; }
}
</style>
</head>

<body>

<div class="top-bar"></div>

<div class="page-wrap">

  <!-- ── Header ── -->
  <div class="header">
    <div>
      <div class="eyebrow">Product Search Tool</div>
      <h1>商品查詢小幫手</h1>
      <div class="header-desc">快速查詢各大電商平台的商品販售情況，掌握上架狀況與價格資訊。</div>
    </div>
    <div class="header-stats">
      <div class="stat-card">
        <div class="stat-num" id="statPlatform">—</div>
        <div class="stat-label">平台</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statBrand">—</div>
        <div class="stat-label">品牌</div>
      </div>
    </div>
  </div>

  <!-- ══ Card 1：一般平台搜尋 ══ -->
  <div class="card">

    <div class="card-header">
      <div class="card-header-icon card-header-icon--green">🔎</div>
      <div class="card-header-title">一般平台搜尋</div>
    </div>

    <div class="search-box">
      <span class="search-icon">🔎</span>
      <input type="text" id="searchInput" class="search-input" placeholder="輸入關鍵字，例如：魚油、益生菌">
      <button class="search-btn search-btn--green" onclick="doSearch()">查詢商品</button>
    </div>

    <div class="grid-2">

      <div class="section-block">
        <div class="section-head">
          <div>
            <div class="section-title"><span class="section-title-dot"></span>平台</div>
            <div class="section-hint">未選擇時將自動查詢所有平台</div>
          </div>
          <button class="clear-btn" onclick="selectNone('platform')">清除</button>
        </div>
        <div class="chips" id="platformGrid"></div>
      </div>

      <div class="section-block">
        <div class="section-head">
          <div>
            <div class="section-title"><span class="section-title-dot"></span>品牌</div>
            <div class="section-hint">未選擇時將自動查詢所有品牌</div>
          </div>
          <button class="clear-btn" onclick="selectNone('brand')">清除</button>
        </div>
        <div class="chips" id="brandGrid"></div>
      </div>

    </div>

    <div class="summary">
      <div class="summary-dot"></div>
      <div class="summary-text" id="selectedCount"></div>
    </div>

    <div class="results" id="results">
      <div class="divider"></div>
      <div class="results-head">
        <div class="results-title"><span class="section-title-dot"></span>查詢結果</div>
        <div class="results-hint">若瀏覽器封鎖彈出視窗，請手動點擊連結開啟</div>
      </div>
      <div class="results-grid" id="linkItems"></div>
    </div>

    <div class="msg" id="resultMsg"></div>

  </div>

  <!-- ══ Card 2：短蝦 / 蝦皮超市 ══ -->
  <div class="card">

    <div class="card-header">
      <div class="card-header-icon card-header-icon--orange">🦐</div>
      <div class="card-header-title">短蝦 / 蝦皮超市</div>
      <div class="card-header-sub">關鍵字 或 品牌，擇一搜尋</div>
    </div>

    <!-- 平台選擇 -->
    <div class="sp-chips">
      <div class="chips" id="spPlatformGrid"></div>
    </div>

    <!-- 模式切換 -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeKw" onclick="setSpMode('keyword')">關鍵字搜尋</button>
      <button class="mode-btn" id="modeBrand" onclick="setSpMode('brand')">品牌篩選</button>
    </div>

    <!-- 關鍵字輸入 -->
    <div id="spKwArea">
      <div class="search-box">
        <span class="search-icon">🔎</span>
        <input type="text" id="spKwInput" class="search-input" placeholder="輸入關鍵字，例如：魚油">
        <button class="search-btn search-btn--orange" onclick="doSpSearch()">查詢</button>
      </div>
    </div>

    <!-- 品牌選擇 -->
    <div id="spBrandArea" style="display:none;">
      <div class="section-block" style="margin-bottom:16px;">
        <div class="section-head">
          <div>
            <div class="section-title"><span class="section-title-dot"></span>選擇品牌</div>
            <div class="section-hint">可多選，每個品牌獨立開啟</div>
          </div>
          <button class="clear-btn" onclick="selectNone('spBrand')">清除</button>
        </div>
        <div class="chips" id="spBrandGrid"></div>
      </div>
      <div style="display:flex;justify-content:flex-end;">
        <button class="search-btn search-btn--orange" onclick="doSpSearch()">查詢</button>
      </div>
    </div>

    <div class="results" id="spResults">
      <div class="divider"></div>
      <div class="results-head">
        <div class="results-title"><span class="section-title-dot"></span>查詢結果</div>
        <div class="results-hint">若瀏覽器封鎖彈出視窗，請手動點擊連結開啟</div>
      </div>
      <div class="results-grid" id="spLinkItems"></div>
    </div>

    <div class="msg" id="spResultMsg"></div>

  </div>

</div>

<script>
const E = encodeURIComponent;
const OPEN_DELAY = 350;

/* ══════════════════════════════════════
   一般平台搜尋
══════════════════════════════════════ */
const platforms = [
  { id:'momo',     name:'momo',     url:q=>`https://www.momoshop.com.tw/search/searchShop.jsp?keyword=${E(q)}` },
  { id:'shopee',   name:'蝦皮',     url:q=>`https://shopee.tw/search?keyword=${E(q)}` },
  { id:'pchome',   name:'PChome',   url:q=>`https://24h.pchome.com.tw/search/?q=${E(q)}` },
  { id:'yahoo',    name:'YAHOO',    url:q=>`https://tw.buy.yahoo.com/search/product?p=${E(q)}` },
  { id:'etmall',   name:'東森',     url:q=>`https://www.etmall.com.tw/Search?keyword=${E(q)}` },
  { id:'cyberbiz', name:'CYBERBIZ', url:q=>null }
];

const brands = [
  { id:'damo',      name:'達摩本草',  official:'https://www.damokampo.com/',      shopeeShopId:'60224952' },
  { id:'petage',    name:'毛孩時代',  official:'https://www.petstimes.com.tw/',   shopeeShopId:'45057582' },
  { id:'yuxi',      name:'御熹堂',    official:'https://www.yunxi.com.tw/',       shopeeShopId:'550900642' },
  { id:'powerhero', name:'PowerHero', official:'https://www.powerhero.com.tw/',   shopeeShopId:'497638840' },
  { id:'ourpet',    name:'奧沛',      official:'https://www.ourpet.com.tw/',      shopeeShopId:'1479499180' },
  { id:'fumu',      name:'芙木之光',  official:'https://www.inalumie.com/',       shopeeShopId:'1082322279' },
  { id:'oshima',    name:'大島生醫',  official:'https://www.oshimashop.com.tw/',  shopeeShopId:'1303992164' },
  { id:'xxs',       name:'XXS',       official:'https://www.xxs.com.tw/',         shopeeShopId:'1426145721' },
  { id:'tryme',     name:'TRYME',     official:'https://www.tryme.com.tw/',       shopeeShopId:'50231292' },
  { id:'yakupet',   name:'優固倍',    official:'https://www.yakupet.com.tw/',     shopeeShopId:'1541818172' }
];

const selP = new Set();
const selB = new Set();

function renderGroup(items, sel, gridId){
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  items.forEach(item=>{
    const btn = document.createElement('button');
    btn.className = 'chip' + (sel.has(item.id) ? ' active' : '');
    btn.dataset.id = item.id;
    btn.textContent = item.name;
    btn.onclick = ()=>{
      sel.has(item.id) ? sel.delete(item.id) : sel.add(item.id);
      renderGroup(items, sel, gridId);
    };
    grid.appendChild(btn);
  });
  updateCount();
}

function updateCount(){
  const p = selP.size || platforms.length;
  const b = selB.size;
  document.getElementById('selectedCount').innerHTML =
    `查詢範圍：<strong>${p}</strong> 個平台` +
    (b ? ` × <strong>${b}</strong> 個品牌` : ' × 全品牌');
  document.getElementById('statPlatform').textContent = platforms.length;
  document.getElementById('statBrand').textContent = brands.length;
}

function selectNone(type){
  if(type === 'platform'){ selP.clear(); renderGroup(platforms, selP, 'platformGrid'); }
  else if(type === 'brand'){ selB.clear(); renderGroup(brands, selB, 'brandGrid'); }
  else if(type === 'spBrand'){ selSB.clear(); renderGroup(brands, selSB, 'spBrandGrid'); }
}

function getShopeeShopSearchUrl(brand, keyword){
  if(brand.shopeeShopId)
    return `https://shopee.tw/mall/search?keyword=${E(keyword)}&shop=${brand.shopeeShopId}`;
  return `https://shopee.tw/search?keyword=${E(brand.name + ' ' + keyword)}`;
}

function getOfficialSearchUrl(brand, keyword){
  if(!keyword) return brand.official;
  const map = {
    powerhero: q=>`https://www.powerhero.com.tw/search?q=${E(q)}`,
    damo:      q=>`https://www.damokampo.com/search?q=${E(q)}`,
    petage:    q=>`https://www.petstimes.com.tw/search?q=${E(q)}`,
    yuxi:      q=>`https://www.yunxi.com.tw/search?q=${E(q)}`,
    ourpet:    q=>`https://www.ourpet.com.tw/search?q=${E(q)}`,
    fumu:      q=>`https://www.inalumie.com/search?q=${E(q)}`,
    oshima:    q=>`https://www.oshimashop.com.tw/search?q=${E(q)}`,
    xxs:       q=>`https://www.xxs.com.tw/search?q=${E(q)}`,
    tryme:     q=>`https://www.tryme.com.tw/search?q=${E(q)}`,
    yakupet:   q=>`https://www.yakupet.com.tw/search?q=${E(q)}`
  };
  return map[brand.id] ? map[brand.id](keyword) : brand.official;
}

function showMsg(text, ok=true){
  const el = document.getElementById('resultMsg');
  el.style.display = 'block';
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.textContent = text;
}

function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  const targetBrands     = brands.filter(b => selB.has(b.id));
  const hasBrand         = targetBrands.length > 0;
  const hasPlatform      = selP.size > 0;
  const activePlatforms  = hasPlatform ? platforms.filter(p => selP.has(p.id)) : platforms;
  const hasCyberbiz      = activePlatforms.some(p => p.id === 'cyberbiz');
  const nonCyberbizPlats = activePlatforms.filter(p => p.id !== 'cyberbiz');

  if(!q && !hasBrand && !hasPlatform){
    showMsg('請輸入商品關鍵字，或選擇欲查詢的平台／品牌', false);
    return;
  }

  const urls = [];
  const push = (platform, keyword, url) => { if(url) urls.push({ platform, keyword, url }); };

  if(!hasBrand && !hasPlatform){
    nonCyberbizPlats.forEach(p => push(p.name, q, p.url(q)));
    brands.forEach(b => push(b.name + ' 官網', q || b.name, getOfficialSearchUrl(b, q)));
  } else if(!hasBrand && hasPlatform){
    nonCyberbizPlats.forEach(p => push(p.name, q, p.url(q)));
    if(hasCyberbiz) brands.forEach(b => push(b.name + ' 官網', q || b.name, getOfficialSearchUrl(b, q)));
  } else if(hasBrand && !hasPlatform){
    nonCyberbizPlats.forEach(p => {
      targetBrands.forEach(b => {
        const kw = `${b.name} ${q}`.trim();
        const u = p.id === 'shopee' ? getShopeeShopSearchUrl(b, q || b.name) : p.url(kw);
        push(p.name, kw, u);
      });
    });
    targetBrands.forEach(b => push(b.name + ' 官網', q || b.name, getOfficialSearchUrl(b, q)));
  } else {
    targetBrands.forEach(b => {
      nonCyberbizPlats.forEach(p => {
        const kw = `${b.name} ${q}`.trim();
        const u = p.id === 'shopee' ? getShopeeShopSearchUrl(b, q || b.name) : p.url(kw);
        push(p.name, kw, u);
      });
      if(hasCyberbiz) push(b.name + ' 官網', q || b.name, getOfficialSearchUrl(b, q));
    });
  }

  renderLinks(urls, 'linkItems', 'results', 'resultMsg', '--green');
  showMsg(`已開啟 ${urls.length} 個查詢頁面`);
}

document.getElementById('searchInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') doSearch();
});

/* ══════════════════════════════════════
   短蝦 / 蝦皮超市 獨立搜尋
══════════════════════════════════════ */
const specialPlatforms = [
  { id:'tsa',        name:'短蝦',
    url:q=>`https://shopee.tw/search?keyword=${E(q)}&shop=1451389614` },
  { id:'shopeemart', name:'蝦皮超市',
    url:q=>`https://shopee.tw/mall/search?keyword=${E(q)}&shop=50662979` }
];

const selSP = new Set();  // 選取的特殊平台
const selSB = new Set();  // 選取的品牌（品牌模式）
let spMode = 'keyword';   // 'keyword' | 'brand'

function renderSpPlatforms(){
  const grid = document.getElementById('spPlatformGrid');
  grid.innerHTML = '';
  specialPlatforms.forEach(p=>{
    const btn = document.createElement('button');
    btn.className = 'chip' + (selSP.has(p.id) ? ' active' : '');
    btn.dataset.id = p.id;
    btn.textContent = p.name;
    btn.onclick = ()=>{
      selSP.has(p.id) ? selSP.delete(p.id) : selSP.add(p.id);
      renderSpPlatforms();
    };
    grid.appendChild(btn);
  });
}

function setSpMode(mode){
  spMode = mode;
  document.getElementById('modeKw').classList.toggle('active', mode === 'keyword');
  document.getElementById('modeBrand').classList.toggle('active', mode === 'brand');
  document.getElementById('spKwArea').style.display    = mode === 'keyword' ? '' : 'none';
  document.getElementById('spBrandArea').style.display = mode === 'brand'   ? '' : 'none';
  document.getElementById('spResults').style.display = 'none';
  document.getElementById('spResultMsg').style.display = 'none';
}

function showSpMsg(text, ok=true){
  const el = document.getElementById('spResultMsg');
  el.style.display = 'block';
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.textContent = text;
}

function doSpSearch(){
  const activeSP = selSP.size > 0
    ? specialPlatforms.filter(p => selSP.has(p.id))
    : specialPlatforms;

  if(activeSP.length === 0){
    showSpMsg('請至少選擇一個平台（短蝦或蝦皮超市）', false);
    return;
  }

  const urls = [];

  if(spMode === 'keyword'){
    const q = document.getElementById('spKwInput').value.trim();
    if(!q){ showSpMsg('請輸入關鍵字', false); return; }
    activeSP.forEach(p => urls.push({ platform: p.name, keyword: q, url: p.url(q) }));
  } else {
    const targetBrands = brands.filter(b => selSB.has(b.id));
    if(!targetBrands.length){ showSpMsg('請選擇至少一個品牌', false); return; }
    activeSP.forEach(p => {
      targetBrands.forEach(b => {
        urls.push({ platform: p.name, keyword: b.name, url: p.url(b.name) });
      });
    });
  }

  renderLinks(urls, 'spLinkItems', 'spResults', 'spResultMsg', '--orange');
  showSpMsg(`已開啟 ${urls.length} 個查詢頁面`);
}

document.getElementById('spKwInput').addEventListener('keydown', e=>{
  if(e.key === 'Enter') doSpSearch();
});

/* ══════════════════════════════════════
   共用：渲染結果列表
══════════════════════════════════════ */
function renderLinks(urls, gridId, resultsId, msgId, colorSuffix){
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  urls.forEach((item, i)=>{
    setTimeout(()=>{ window.open(item.url, '_blank'); }, i * OPEN_DELAY);
    const a = document.createElement('a');
    a.href = item.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.className = 'result-link';
    a.innerHTML = `
      <div class="result-left">
        <div class="result-platform result-platform${colorSuffix}">${item.platform}</div>
        <div class="result-keyword">${item.keyword}</div>
      </div>
      <div class="result-arrow">↗</div>
    `;
    grid.appendChild(a);
  });
  document.getElementById(resultsId).style.display = 'block';
}

/* ══════════════════════════════════════
   初始化
══════════════════════════════════════ */
renderGroup(platforms, selP, 'platformGrid');
renderGroup(brands, selB, 'brandGrid');
renderGroup(brands, selSB, 'spBrandGrid');
renderSpPlatforms();

// 初始化：兩個特殊平台預設全選
specialPlatforms.forEach(p => selSP.add(p.id));
renderSpPlatforms();
</script>
</body>
</html>
